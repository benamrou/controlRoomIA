<div class="grid nested-grid pt-3" style="height: 80%; min-height: 80%;">
    <div class="col-10">
        <!-- Counting item list -->
        <div class="p-3 border-round-sm h-full font-bold">
            <div class="grid grid-nogutter card">
                <p-dataView #dv [value]="products">
                    <ng-template pTemplate="list" let-products>
                            <div class="col-12" *ngFor="let item of products; let first = first" class="col-12">
                                <div class="flex flex-column sm:flex-row  p-4 gap-3" [ngClass]="{ 'border-top-1 surface-border': !first }">
                                    <div class="md:w-10rem relative">
                                        <img class="block xl:block mx-auto border-round w-full" [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + item.image" [alt]="item.name" />
                                        <p-tag [value]="item.inventoryStatus" [severity]="getSeverity(item)" class="absolute" [style.left.px]="4" [style.top.px]="4" />
                                    </div>
                                    <div class="flex flex-column md:flex-row justify-content-between md:align-items-center flex-1 gap-4">
                                        <div class="flex flex-row md:flex-column justify-content-between align-items-start gap-2">
                                            <div>
                                                <span class="font-medium text-secondary text-sm">{{ item.category }}</span>
                                                <div class="text-lg font-medium text-900 mt-2">{{ item.name }}</div>
                                            </div>
                                            <div class="surface-100 p-1" style="border-radius: 30px">
                                                <div class="surface-0 flex align-items-center gap-2 justify-content-center py-1 px-2" style="border-radius: 30px; box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.04), 0px 1px 2px 0px rgba(0, 0, 0, 0.06)">
                                                    <span class="text-900 font-medium text-sm">{{ item.retail }}</span>
                                                    <i class="pi pi-star-fill text-yellow-500"></i>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="flex flex-column md:align-items-end gap-5">
                                            <span class="text-xl font-semibold text-900">{{ '$' + item.price }}</span>
                                            <div class="flex flex-row-reverse md:flex-row gap-2">
                                                <p-button icon="pi pi-heart" [outlined]="true" />
                                                <p-button icon="pi pi-shopping-cart" class="flex-auto md:flex-initial white-space-nowrap" label="Buy Now" [disabled]="item.inventoryStatus === 'OUTOFSTOCK'" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                        </div>
                    </ng-template>
                </p-dataView>
            </div>
        </div>
    </div>
    <div class="col-2">
        <div class="grid" style="height: 40%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full bg-primary font-bold">6/12/2</div>
            </div>
        </div>
        <div class="grid" style="height: 40%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full bg-primary font-bold">6/12/2</div>
            </div>
        </div>
        <div class="grid" style="height: 20%">
            <div class="col-12">
                <button class="button-transparent colorButton scanbutton" style="width: 100px; height:100px;box-shadow: 1px 1px 20px 1px gray; " 
                                (click)="scan()">
                    <i class="pi pi-qrcode " style="font-size: 2rem; color:var(--gray-800);"></i>
            </button>
            </div>
        </div>
    </div>
</div>
