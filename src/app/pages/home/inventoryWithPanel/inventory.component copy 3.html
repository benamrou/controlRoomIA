<div class="grid nested-grid pt-3" style="height: 85%; min-height: 85%; overflow: overlay;">
    <div class="col-10">
        <div class="row" style="width: 100%; padding-bottom: 1em; padding-left:1em;">
            <div style="width:40%; font-weight: bold; color: black">
                <p-inputGroup>
                    <p-inputGroupAddon addonType="prepend">
                        <i class="pi pi-search "></i>
                    </p-inputGroupAddon>
                    <input pInputText placeholder="Search..." />
                </p-inputGroup>
            </div>      
            <div class="absolute right-0" style="margin-right: 1em; width: 60%;">
                <div style="margin-right: 1em; width: 30%; float: right" >
                    <p-dropdown [style]="{'width':'100%'}" [options]="sortByOption" [(ngModel)]="sortedBy">
                        <ng-template pTemplate="selectedItem">
                            <div style="font-weight: 900;">
                                <div>{{ sortedBy }}</div>
                            </div>
                        </ng-template>
                    </p-dropdown>               
                </div>
                <div style="margin-right: 1em; width: 30%; float: right">
                    <p-multiSelect [style]="{'width':'100%'}" [options]="filterByOption" 
                                   [(ngModel)]="filterBy"
                                   optionLabel="name" 
                                   placeholder="FILTER ON "
                                   (onChange)="filterChange()" >

                        <ng-template let-value pTemplate="selectedItems">
                            <div class="inline-flex align-items-center gap-2 px-1" *ngFor="let option of value">
                                <div>{{ option.code }},</div>
                            </div>
                            <div *ngIf="!value || value.length === 0">FILTER</div>
                        </ng-template>
                    </p-multiSelect>               
                </div>      
            </div>
        </div>
        <div  *ngIf="loadingComplete" style="height: 80%; width:100%; max-height:100%; ">
            <p-tabView [(activeIndex)]="activeIndex" [scrollable]="true" [selectOnFocus]="true" >
                <p-tabPanel *ngFor="let supplier of supplierList" [header]="supplier.name"  >
                    <ng-template pTemplate="item" let-item let-options="options">
                        <p-card class="row" *ngFor="let item of products; let first = first" >
                            <ng-template pTemplate="header">
                                {{ item.itemDesc }}
                            </ng-template>
                        </p-card>
                    </ng-template>
                </p-tabPanel>
            </p-tabView>
        </div>
        <div class="row" style="width: 100%;height: 15%">
            FOOTER
        </div>
    </div>
    <div class="col-2" style="height: 100%;">
        <div class="grid" style="height: 40%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full bg-primary font-bold">6/12/2</div>
            </div>
        </div>
        <div class="grid" style="height: 40%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full bg-primary font-bold">6/12/2</div>
            </div>
        </div>
        <div class="grid" style="height: 20%">
            <div class="col-12">
                <button class="button-transparent colorButton scanbutton" style="width: 100px; height:100px;box-shadow: 1px 1px 20px 1px gray; " 
                                (click)="scan()">
                    <i class="pi pi-qrcode " style="font-size: 2rem; color:var(--gray-800);"></i>
            </button>
            </div>
        </div>
    </div>
</div>
