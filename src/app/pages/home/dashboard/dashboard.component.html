<div class="grid nested-grid pt-3" style="height: 80%; min-height: 80%;">
    <div class="col-8">
        <div class="text-center p-3 border-round-sm h-full font-bold">
            <p-table [value]="resultInventory" [tableStyle]="{'min-width': '60rem'}">
                <ng-template pTemplate="caption">
                    <div class="flex align-items-center justify-content-between">
                        Products
                        <p-button icon="pi pi-refresh" />
                    </div>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th>Name</th>
                        <th>Image</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th>Reviews</th>
                        <th>Status</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-product>
                    <tr>
                        <td>{{product.name}}</td>
                        <td><img [src]="'https://primefaces.org/cdn/primeng/images/demo/product/' + product.image" [alt]="product.name" width="100" class="shadow-4" /></td>
                        <td>{{product.price | currency:'USD'}}</td>
                        <td>{{product.category}}</td>
                        <td><p-rating [(ngModel)]="product.rating" [readonly]="true" [cancel]="false" /></td>
                        <td><p-tag [value]="product.inventoryStatus" [severity]="getStatus(product['Status'])" /></td>
                    </tr>
                </ng-template>
                <ng-template pTemplate="summary">
                    <div class="flex align-items-center justify-content-between">
                        In total there are {{resultInventory ? resultInventory.length : 0 }} products.
                    </div>
                </ng-template>
            </p-table>
        </div>
    </div>
    <div class="col-4">
        <!-- CALENDAR -->
        <div class="grid" style="height: 60%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full font-bold">
                    <p-calendar 
                        class="max-w-full" 
                        [style]="{'width':'100%'}" [inputStyle]="{'width':'100%'}" 
                        [(ngModel)]="datePicked" 
                        [inline]="true" 
                        [showWeek]="false">
                        <ng-template pTemplate="date" let-date>
                            <span [ngStyle]="{background: 
                                isInventoryDate(date) ? 'yellow' : 'inherit'}">
                                {{date.day}}
                            </span>
                        </ng-template>
                    </p-calendar>


                </div>
            </div>
        </div>
        <div class="grid" style="height: 40%">
            <div class="col-12">
                <div class="text-center p-3 border-round-sm h-full bg-primary font-bold">6/12/2</div>
            </div>
        </div>
    </div>
</div>
